<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#08080f"/>
    </linearGradient>
    <linearGradient id="xgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6"/>
      <stop offset="45%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="xgrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="55%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="0" fill="url(#bg)"/>

  <!-- Inner frame (sharp, no rounded corners) -->
  <rect x="12" y="12" width="488" height="488" fill="none" stroke="#1a1a30" stroke-width="1"/>

  <!-- Tech grid -->
  <g opacity="0.025" stroke="#7c3aed" stroke-width="0.5">
    <line x1="0" y1="64" x2="512" y2="64"/><line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/><line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/><line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="64" y1="0" x2="64" y2="512"/><line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/><line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!--
    Musk-style X:
    - Top-left bar: wide, sharp, tapers from thick to thin
    - Bottom-right bar: companion stroke
    - Top-right bar: slightly thinner, also sharp
    - Bottom-left bar: companion stroke
    The key is: no rounded caps, sharp angular cuts, thick presence, slight asymmetry
  -->

  <!-- Left bar of X (top-left to bottom-right) - thicker -->
  <g filter="url(#glow)">
    <polygon points="86,98 128,98 396,414 362,414" fill="url(#xgrad)"/>
  </g>

  <!-- Right bar of X (top-right to bottom-left) - slightly offset for Musk-style asymmetry -->
  <g filter="url(#glow)">
    <polygon points="426,98 384,98 116,414 150,414" fill="url(#xgrad2)"/>
  </g>

  <!-- Center overlap highlight -->
  <polygon points="236,236 276,236 276,276 236,276" fill="#e8e0ff" opacity="0.15" filter="url(#glow)"/>

  <!-- Brand text -->
  <text x="256" y="478" text-anchor="middle"
        font-family="'SF Mono', 'JetBrains Mono', 'Consolas', 'Courier New', monospace"
        font-size="38" font-weight="800" letter-spacing="18"
        fill="#9888c8">AGENTX</text>
</svg>
